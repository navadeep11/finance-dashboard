<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FinTrack — Personal Finance Dashboard to track income, expenses, and spending patterns." />
    <title>FinTrack — Finance Dashboard</title>
    <!-- Anti-FOUC: apply dark class before React hydrates -->
    <script>
      (function() {
        var t = localStorage.getItem('finance_theme') || 'dark';
        if (t === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
